services:
  sandbox-oracle-database:
    image: container-registry.oracle.com/database/free:latest
    container_name: sandbox-oracle-database
    labels:
      com.sandbox.service: "database"
      com.sandbox.description: "Oracle AI Database 26ai Free"
      com.sandbox.version: "26ai"
      com.sandbox.owner: "demasylabs"
    ports:
      - "127.0.0.1:${ENV_DB_PORT_LISTENER}:1521"
      # Note: Enterprise Manager (5500) not available in Database Free Edition
      # APEX is accessed via ORDS on port 8080 from the app server
    environment:
      - TZ=${ENV_TIME_ZONE}
      - ORACLE_SID=${ENV_DB_SID}
      - ORACLE_PDB=${ENV_DB_SERVICE}
      - ORACLE_PWD=${ENV_DB_PASSWORD}
      - ORACLE_CHARACTERSET=${ENV_DB_CHARACTERSET}
    volumes:
      - sandbox_oracle_vol:/opt/oracle/oradata
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'SELECT 1 FROM DUAL;' | sqlplus -s ${ENV_DB_USER}/${ENV_DB_PASSWORD}@localhost:1521/${ENV_DB_SID} | grep -q 1",
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 240s
    networks:
      sandbox_network:
        ipv4_address: ${ENV_IP_DB_SERVER}
        aliases:
          - sandbox-db
          - oracle-database
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - SETFCAP
      - NET_BIND_SERVICE
      - SYS_NICE
    deploy:
      resources:
        limits:
          cpus: "${ENV_DB_CPU_LIMIT}"
          memory: "${ENV_DB_MEMORY_LIMIT}"
        reservations:
          cpus: "2"
          memory: "4g"

  sandbox-oracle-server:
    image: sandbox-oracle-sandbox:latest
    build:
      context: ./
      args:
        SRC_ORACLE_SQLCL: ${ENV_SRC_ORACLE_SQLCL}
        SRC_ORACLE_SQLPLUS: ${ENV_SRC_ORACLE_SQLPLUS}
        SRC_ORACLE_APEX: ${ENV_SRC_ORACLE_APEX}
        SRC_ORACLE_ORDS: ${ENV_SRC_ORACLE_ORDS}
        SRC_ORACLE_INSTANTCLIENT: ${ENV_SRC_ORACLE_INSTANTCLIENT}
        INSTALL_APEX: ${ENV_INSTALL_APEX}
    container_name: sandbox-oracle-server
    labels:
      com.sandbox.service: "application"
      com.sandbox.description: "Oracle Sandbox Management Server"
      com.sandbox.version: "1.0.0"
      com.sandbox.owner: "demasylabs"
    ports:
      - "127.0.0.1:${ENV_SERVER_PORT}:3000"      # Management server health check & API
      - "127.0.0.1:${ENV_APEX_PORT:-8080}:8080"  # APEX & ORDS web interface
      - "127.0.0.1:${ENV_MCP_PORT:-3001}:3001"   # Claude Code MCP server
    depends_on:
      sandbox-oracle-database:
        condition: service_started
    environment:
      - COMPOSE_FILE=docker-compose.yml
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-sandbox}
      - TZ=${ENV_TIME_ZONE}
      - NODE_ENV=${ENV_NODE_ENV:-demasylabs-sandbox}
      - HOST=0.0.0.0
      - SANDBOX_DB_CLIENT=${ENV_DB_CLIENT}
      - SANDBOX_DB_CONNECT_STRING=${ENV_IP_DB_SERVER}:${ENV_DB_PORT_LISTENER}/${ENV_DB_SERVICE}
      - SANDBOX_DB_HOST=${ENV_IP_DB_SERVER}
      - SANDBOX_DB_PORT=${ENV_DB_PORT_LISTENER}
      - SANDBOX_DB_SERVICE=${ENV_DB_SERVICE}
      - SANDBOX_DB_SID=${ENV_DB_SID}
      - SANDBOX_DB_USER=${ENV_DB_USER}
      - SANDBOX_DB_MCP_USER=${ENV_DB_MCP_USER}
      - SANDBOX_DB_MCP_SERVICE=${ENV_DB_MCP_SERVICE}
      - SANDBOX_DB_PASSWORD=${ENV_DB_PASSWORD}
      - SANDBOX_DB_PASS=${ENV_DB_PASSWORD}
      - SANDBOX_DB_POOL_MIN=${ENV_DB_POOL_MIN}
      - SANDBOX_DB_POOL_MAX=${ENV_DB_POOL_MAX}
      - SANDBOX_DB_POOL_INCREMENT=${ENV_DB_POOL_INCREMENT}
      - SANDBOX_APEX_DEFAULT_WORKSPACE=${ENV_APEX_DEFAULT_WORKSPACE}
      - SANDBOX_APEX_ADMIN_USERNAME=${ENV_APEX_ADMIN_USERNAME}
      - SANDBOX_APEX_ADMIN_PASSWORD=${ENV_APEX_ADMIN_PASSWORD}
      - SANDBOX_APEX_EMAIL=${ENV_APEX_EMAIL}
      - SANDBOX_APEX_HOME=${ENV_APEX_HOME}
      - SANDBOX_APEX_IMAGES_DIR=${ENV_APEX_IMAGES_DIR}
      - SANDBOX_APEX_INSTALL_LOG=${ENV_APEX_INSTALL_LOG}
      - SANDBOX_APEX_TABLE_SPACE=${ENV_APEX_TABLE_SPACE}
      - SANDBOX_APEX_TABLE_SPACE_FILES=${ENV_APEX_TABLE_SPACE_FILES}
      - SANDBOX_APEX_SECURITY_GROUP_ID=${ENV_APEX_SECURITY_GROUP_ID}
      - SANDBOX_APEX_TABLESPACE_SIZE=${ENV_APEX_TABLESPACE_SIZE}
      - SANDBOX_APEX_TABLESPACE_AUTOEXTEND=${ENV_APEX_TABLESPACE_AUTOEXTEND}
      - SANDBOX_ORDS_HOME=${ENV_ORDS_HOME}
      - SANDBOX_ORDS_CONFIG=${ENV_ORDS_CONFIG}
      - SANDBOX_ORDS_LOG=${ENV_ORDS_LOG}
      - SANDBOX_ORDS_PORT=${ENV_ORDS_PORT}
      - SANDBOX_ORDS_JDBC_MIN_LIMIT=${ENV_ORDS_JDBC_MIN_LIMIT}
      - SANDBOX_ORDS_JDBC_MAX_LIMIT=${ENV_ORDS_JDBC_MAX_LIMIT}
      - SANDBOX_ORDS_JDBC_INITIAL_LIMIT=${ENV_ORDS_JDBC_INITIAL_LIMIT}
      - SANDBOX_ORDS_STATEMENT_TIMEOUT=${ENV_ORDS_STATEMENT_TIMEOUT}
      - SANDBOX_AUTO_INSTALL_APEX_ON_STARTUP=${ENV_AUTO_INSTALL_APEX_ON_STARTUP}
      - SANDBOX_SHOW_APEX_INSTALL_LOGS=${ENV_SHOW_APEX_INSTALL_LOGS}
      - SANDBOX_APEX_INSTALL_TIMEOUT=${ENV_APEX_INSTALL_TIMEOUT}
      - SANDBOX_STARTUP_WAIT_FOR_DB=${ENV_STARTUP_WAIT_FOR_DB}
      - SANDBOX_STARTUP_DB_WAIT_TIMEOUT=${ENV_STARTUP_DB_WAIT_TIMEOUT}
      - SANDBOX_STARTUP_DB_WAIT_INTERVAL=${ENV_STARTUP_DB_WAIT_INTERVAL}
    volumes:  
      - sandbox_logs_vol:/home/oracle/logs
      - sandbox_dbtools_vol:/home/sandbox/.dbtools
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      sandbox_network:
        ipv4_address: ${ENV_IP_APP_SERVER}
        aliases:
          - sandbox-server
          - sandbox-app
    deploy:
      resources:
        limits:
          cpus: "${ENV_SERVER_CPU_LIMIT}"
          memory: "${ENV_SERVER_MEMORY_LIMIT}"
        reservations:
          cpus: "2"
          memory: "2g"

networks:
  sandbox_network:
    name: sandbox_network
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"
      # Bind published ports to localhost by default for local development.
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
    ipam:
      driver: default
      config:
        - subnet: ${ENV_NETWORK_SUBNET}
          gateway: ${ENV_NETWORK_GATEWAY}

volumes:
  sandbox_oracle_vol:
    driver: local
    name: sandbox_oracle_vol
    # Note: Volume size limits require quota support. If your Docker daemon doesn't support
    # quota (common on macOS/Docker Desktop), remove the driver_opts section below.
    # Uncomment to enable size limits on systems that support it:
    # driver_opts:
    #   size: 20g
    labels:
      com.sandbox.description: "Oracle database files and ORDS/APEX data"
      com.sandbox.owner: "demasylabs"
      com.sandbox.backup: "true"
      com.sandbox.data-classification: "internal"
      com.sandbox.compliance: "development-only"
      com.sandbox.services: "sandbox-oracle-database"
      com.sandbox.sensitive-data: "true"
      com.sandbox.snapshot-frequency: "daily"
      com.sandbox.snapshot-retention: "7 days"
  sandbox_logs_vol:
    driver: local
    name: sandbox_logs_vol
    # driver_opts:
    #   size: 5g
    labels:
      com.sandbox.description: "Application and database logs"
      com.sandbox.owner: "demasylabs"
      com.sandbox.retention: "30 days"
      com.sandbox.backup: "false"
      com.sandbox.data-classification: "internal"
      com.sandbox.compliance: "development-only"
      com.sandbox.services: "sandbox-oracle-database,sandbox-oracle-server"
      com.sandbox.sensitive-data: "false"
      com.sandbox.snapshot-frequency: "weekly"
      com.sandbox.snapshot-retention: "2 weeks"
  sandbox_dbtools_vol:
    driver: local
    name: sandbox_dbtools_vol
    # driver_opts:
    #   size: 2g
    labels:
      com.sandbox.description: "DBTools configuration and cache"
      com.sandbox.owner: "demasylabs"
      com.sandbox.backup: "false"
      com.sandbox.data-classification: "internal"
      com.sandbox.compliance: "development-only"
      com.sandbox.services: "sandbox-oracle-server"
      com.sandbox.sensitive-data: "false"
      com.sandbox.snapshot-frequency: "none"
      com.sandbox.snapshot-retention: "none"
