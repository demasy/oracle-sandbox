version: "1.0.0"
description: "Oracle Sandbox AI Database - Privilege Levels & Grants"
owner: "Demasy Labs"
contact: "founder@demasy.io"
repository: "https://github.com/demasy/oracle-sandbox"
created: "2026-06-23"
last_updated: "2026-06-23"

# ─── PRIVILEGE LEVELS ──────────────────────────────────────────────────────────
privilege_levels:

  minimal:
    description: "Basic connectivity and own-schema DDL/DML only"
    roles:
      - "CONNECT"
      - "RESOURCE"
    
    system_privileges:
      - "CREATE SESSION"
      - "ALTER SESSION"
      - "UNLIMITED TABLESPACE"
      - "CREATE TABLE"
      - "CREATE VIEW"
      - "CREATE PROCEDURE"
      - "CREATE SEQUENCE"
      - "CREATE TRIGGER"
      - "CREATE SYNONYM"
      - "CREATE TYPE"
      - "CREATE DATABASE LINK"
      - "ALTER TABLE"
      - "DROP TABLE"
      - "DROP VIEW"
      - "DROP PROCEDURE"
      - "DROP SEQUENCE"
      - "DROP TRIGGER"
    
    object_privileges:
      own_schema:
        - "SELECT"
        - "INSERT"
        - "UPDATE"
        - "DELETE"
        - "REFERENCES"
        - "INDEX"
        - "ALTER"
        - "EXECUTE"
      system_packages:
        - "DBMS_OUTPUT"
        - "DBMS_SESSION"
        - "DBMS_LOCK"

  normal:
    description: "Extended DDL/DML with cross-schema operations and catalog access"
    roles:
      - "CONNECT"
      - "RESOURCE"
      - "SELECT_CATALOG_ROLE"
    
    system_privileges:
      - "CREATE SESSION"
      - "ALTER SESSION"
      - "UNLIMITED TABLESPACE"
      - "CREATE TABLE"
      - "CREATE VIEW"
      - "CREATE PROCEDURE"
      - "CREATE SEQUENCE"
      - "CREATE TRIGGER"
      - "CREATE SYNONYM"
      - "CREATE TYPE"
      - "CREATE DATABASE LINK"
      - "ALTER TABLE"
      - "DROP TABLE"
      - "DROP VIEW"
      - "DROP PROCEDURE"
      - "DROP SEQUENCE"
      - "DROP TRIGGER"
      - "ALTER ANY TABLE"
      - "DROP ANY TABLE"
      - "CREATE ANY TABLE"
      - "CREATE ANY VIEW"
      - "CREATE ANY PROCEDURE"
      - "CREATE ANY SEQUENCE"
      - "CREATE ANY SYNONYM"
      - "CREATE ANY TRIGGER"
      - "CREATE ANY TYPE"
      - "SELECT ANY TABLE"
      - "SELECT ANY DICTIONARY"
      - "ANALYZE ANY"
      - "ANALYZE ANY DICTIONARY"
      - "LOCK ANY TABLE"
      - "COMMENT ANY TABLE"
      - "FLASHBACK ANY TABLE"
      - "CREATE ANY INDEX"
      - "CREATE ANY CLUSTER"
      - "CREATE ANY DIMENSION"
      - "CREATE ANY JOB"
      - "EXECUTE ANY PROGRAM"
      - "MANAGE SCHEDULER"
    
    object_privileges:
      any_schema:
        - "SELECT"
        - "INSERT"
        - "UPDATE"
        - "DELETE"
        - "REFERENCES"
        - "EXECUTE"
      system_packages:
        - "DBMS_SQL"
        - "DBMS_UTILITY"
        - "DBMS_DESCRIBE"
        - "DBMS_ALERT"
        - "DBMS_APPLICATION_INFO"
        - "DBMS_TRANSACTION"
        - "DBMS_DATA_MINING"
        - "DBMS_PREDICTIVE_ANALYTICS"

  admin:
    description: "Full DBA privileges and administrative control"
    roles:
      - "DBA"
    
    system_privileges:
      - "CREATE USER"
      - "ALTER USER"
      - "DROP USER"
      - "CREATE PROFILE"
      - "ALTER PROFILE"
      - "DROP PROFILE"
      - "CREATE ROLE"
      - "ALTER ROLE"
      - "DROP ROLE"
      - "GRANT ANY PRIVILEGE"
      - "GRANT ANY OBJECT PRIVILEGE"
      - "GRANT ANY ROLE"
      - "ALTER SYSTEM"
      - "CREATE AUDIT"
      - "ALTER AUDIT"
      - "DROP AUDIT"
      - "AUDIT SYSTEM"
      - "NOAUDIT SYSTEM"
      - "CREATE TABLESPACE"
      - "ALTER TABLESPACE"
      - "DROP TABLESPACE"
      - "UNLIMITED TABLESPACE"
      - "MANAGE TABLESPACE"
      - "ALTER DATABASE"
      - "ALTER SESSION"
      - "CREATE DATABASE LINK"
      - "CREATE PUBLIC DATABASE LINK"
      - "DROP DATABASE LINK"
      - "RESTRICTED SESSION"
      - "BACKUP ANY TABLE"
      - "EXECUTE ANY PROCEDURE"
      - "EXECUTE ANY PROGRAM"
      - "WITH ADMIN OPTION"
      - "CREATE ANY MINING MODEL"
      - "ALTER ANY MINING MODEL"
      - "DROP ANY MINING MODEL"
      - "SELECT ANY MINING MODEL"
      - "AUDIT ANY"
      - "EXECUTE ANY CLASS"
      - "MANAGE ANY QUEUE"
      - "ENQUEUE ANY QUEUE"
      - "DEQUEUE ANY QUEUE"
    
    object_privileges:
      all_objects:
        - "SELECT"
        - "INSERT"
        - "UPDATE"
        - "DELETE"
        - "REFERENCES"
        - "EXECUTE"
        - "ALTER"
        - "INDEX"
        - "READ"
        - "WRITE"